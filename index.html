<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>been there</title>
    <meta name="description" content="A minimal travel map. Click countries you've visited.">
    <meta name="theme-color" content="#faf8f5">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌍</text></svg>">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Silkscreen:wght@400;700&display=swap">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg: #faf8f5;
            --surface: #faf8f5;
            --ocean: #f3f0ea;
            --land: #e0dbd2;
            --land-stroke: #d4cfc5;
            --land-hover: #d6d1c7;
            --visited: #7d8c6e;
            --visited-stroke: #6d7b5f;
            --visited-hover: #728164;
            --graticule: #ece8e0;
            --text: #37352f;
            --text-secondary: #787774;
            --text-tertiary: #a3a09a;
            --border: rgba(55, 53, 47, 0.09);
            --hover-bg: rgba(55, 53, 47, 0.04);
            --active-bg: rgba(55, 53, 47, 0.06);
            --accent: #7d8c6e;
        }

        html, body {
            height: 100%;
            overflow: hidden;
            background: var(--bg);
            color: var(--text);
            font-family: "Silkscreen", cursive;
            font-size: 14px;
            -webkit-font-smoothing: auto;
        }

        /* ── Loading ── */
        #loading {
            position: fixed;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 14px;
            background: var(--bg);
            z-index: 100;
            transition: opacity 0.5s ease, visibility 0.5s ease;
        }

        #loading.hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }

        #loading p {
            font-size: 14px;
            color: var(--text-tertiary);
        }

        .loader {
            width: 20px;
            height: 20px;
            border: 2px solid var(--border);
            border-top-color: var(--text-secondary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* ── Header ── */
        header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 45px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 12px 0 16px;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            z-index: 50;
            user-select: none;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        h1 {
            font-size: 14px;
            font-weight: 500;
            color: var(--text);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        h1 .icon {
            font-size: 18px;
            line-height: 1;
        }

        .counter {
            display: flex;
            align-items: center;
            gap: 0;
            font-size: 12px;
            color: var(--text-tertiary);
            background: var(--hover-bg);
            border-radius: 4px;
            padding: 2px 8px;
        }

        #count {
            font-weight: 600;
            color: var(--text-secondary);
            margin-right: 2px;
        }

        .counter .sep {
            margin: 0 2px;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 2px;
        }

        button {
            font-family: inherit;
            font-weight: 400;
            font-size: 13px;
            color: var(--text-secondary);
            background: transparent;
            border: none;
            border-radius: 4px;
            padding: 4px 8px;
            cursor: pointer;
            transition: background 0.1s ease;
            white-space: nowrap;
            line-height: 1.4;
        }

        button:hover {
            background: var(--hover-bg);
        }

        button:active {
            background: var(--active-bg);
        }

        button:disabled {
            opacity: 0.4;
            cursor: default;
        }

        button.confirm {
            color: #e03e3e;
        }

        button.success {
            color: var(--accent);
        }

        /* ── Map ── */
        #map-container {
            position: fixed;
            inset: 0;
            padding-top: 45px;
        }

        #map {
            width: 100%;
            height: 100%;
            cursor: default;
            touch-action: none;
            shape-rendering: crispEdges;
        }

        #map.panning {
            cursor: grabbing;
        }

        .sphere {
            fill: var(--ocean);
        }

        .graticule {
            fill: none;
            stroke: var(--graticule);
            stroke-width: 0.5;
        }

        .graticule-fine {
            fill: none;
            stroke: var(--graticule);
            stroke-width: 0.3;
            opacity: 0.4;
        }

        .river {
            fill: none;
            stroke: var(--land-stroke);
            stroke-width: 0.5;
            opacity: 0.55;
            pointer-events: none;
        }

        .antarctica {
            fill: var(--land);
            stroke: var(--land-stroke);
            stroke-width: 0.3;
            pointer-events: none;
        }

        .wave-pixel {
            fill: none;
            stroke: var(--land-stroke);
            stroke-width: 0.5;
            opacity: 0;
            pointer-events: none;
            animation: wave-bob 3s ease-in-out infinite;
        }

        .wind-pixel {
            fill: none;
            stroke: var(--text-tertiary);
            stroke-width: 0.4;
            opacity: 0;
            pointer-events: none;
            animation: wind-drift 5s ease-in-out infinite;
        }

        @keyframes wave-bob {
            0%, 100% { opacity: 0.35; transform: translateY(0); }
            50% { opacity: 0.6; transform: translateY(-1.2px); }
        }

        @keyframes wind-drift {
            0% { opacity: 0; transform: translateX(0); }
            20% { opacity: 0.3; }
            80% { opacity: 0.3; }
            100% { opacity: 0; transform: translateX(6px); }
        }

        .ocean-label {
            fill: var(--text-tertiary);
            font-family: "Silkscreen", cursive;
            font-size: 3px;
            text-anchor: middle;
            letter-spacing: 0.3em;
            opacity: 0.25;
            pointer-events: none;
        }

        .compass-rose line, .compass-rose path {
            stroke: var(--text-tertiary);
            stroke-width: 0.4;
            fill: none;
        }

        .compass-rose text {
            fill: var(--text-tertiary);
            font-family: "Silkscreen", cursive;
            font-size: 3px;
            text-anchor: middle;
        }

        .boundary {
            fill: none;
            stroke: rgba(55, 53, 47, 0.08);
            stroke-width: 0.5;
        }

        .country {
            fill: var(--land);
            stroke: var(--land-stroke);
            stroke-width: 0.5;
            cursor: pointer;
            transition: fill 0.2s ease, stroke 0.2s ease;
        }

        .country:hover {
            fill: var(--land-hover);
        }

        .country.visited {
            fill: var(--visited);
            stroke: var(--visited-stroke);
        }

        .country.visited:hover {
            fill: var(--visited-hover);
        }

        .country.pulse {
            animation: click-pulse 0.3s ease-out;
        }

        @keyframes click-pulse {
            0% { filter: brightness(1.08); }
            100% { filter: brightness(1); }
        }

        @keyframes reveal {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .country.revealing {
            opacity: 0;
            animation: reveal 0.5s ease forwards;
        }

        /* ── Country Labels ── */
        .country-label {
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .country-label.visible {
            opacity: 1;
        }

        .country-label rect {
            fill: var(--visited);
            rx: 2;
        }

        .country-label text {
            fill: #fff;
            font-family: "Silkscreen", cursive;
            font-size: 3.5px;
            font-weight: 500;
            letter-spacing: 0.04em;
            text-anchor: middle;
            dominant-baseline: central;
            text-transform: uppercase;
        }

        /* ── Tooltip ── */
        #tooltip {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            font-family: inherit;
            font-weight: 400;
            font-size: 13px;
            color: var(--text);
            background: var(--surface);
            padding: 6px 16px;
            border-radius: 4px;
            border: 1px solid var(--border);
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.15s ease;
            z-index: 40;
            white-space: nowrap;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        #tooltip.visible {
            opacity: 1;
        }

        #tooltip-check {
            color: var(--accent);
            font-weight: 600;
            display: none;
        }

        #tooltip-check.show {
            display: inline;
        }

        /* ── Zoom Controls ── */
        #zoom-controls {
            position: fixed;
            bottom: 24px;
            right: 16px;
            display: flex;
            flex-direction: column;
            gap: 1px;
            z-index: 40;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 4px;
            overflow: hidden;
            opacity: 0.6;
            transition: opacity 0.2s ease;
        }

        #zoom-controls:hover {
            opacity: 1;
        }

        #zoom-controls button {
            width: 30px;
            height: 28px;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 15px;
            color: var(--text-secondary);
            border-radius: 0;
        }

        #zoom-controls button:not(:last-child) {
            border-bottom: 1px solid var(--border);
        }

        /* ── Responsive ── */
        @media (max-width: 640px) {
            header {
                padding: 0 10px 0 12px;
                height: 42px;
            }
            h1 { font-size: 13px; }
            h1 .icon { font-size: 16px; }
            .header-left { gap: 10px; }
            .counter { font-size: 11px; padding: 2px 6px; }
            button { font-size: 12px; padding: 3px 6px; }
            #map-container { padding-top: 42px; }
            #tooltip {
                bottom: 16px;
                font-size: 12px;
                padding: 5px 12px;
            }
            #zoom-controls {
                bottom: 16px;
                right: 10px;
            }
        }
    </style>
</head>
<body>
    <div id="loading">
        <div class="loader"></div>
        <p>Loading map&hellip;</p>
    </div>

    <header>
        <div class="header-left">
            <h1><span class="icon">🌍</span> been there</h1>
            <div class="counter">
                <span id="count">0</span>
                <span class="sep">/</span>
                <span id="total">&mdash;</span>
            </div>
        </div>
        <div class="header-right">
            <button id="export-btn">Export</button>
            <button id="reset-btn">Reset</button>
        </div>
    </header>

    <div id="map-container">
        <svg id="map"></svg>
    </div>

    <div id="tooltip">
        <span id="tooltip-name"></span>
        <span id="tooltip-check">&check;</span>
    </div>

    <div id="zoom-controls">
        <button id="zoom-in-btn" title="Zoom in">+</button>
        <button id="zoom-out-btn" title="Zoom out">&minus;</button>
        <button id="zoom-reset-btn" title="Reset view">&#8634;</button>
    </div>

    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/topojson-client@3"></script>
    <script>
    (async function () {

        // ── Country name mapping (ISO 3166-1 numeric codes) ──
        var NAMES = {
            "004":"Afghanistan","008":"Albania","012":"Algeria","024":"Angola",
            "028":"Antigua and Barbuda","032":"Argentina","036":"Australia",
            "040":"Austria","044":"Bahamas","048":"Bahrain","050":"Bangladesh",
            "051":"Armenia","052":"Barbados","056":"Belgium","064":"Bhutan",
            "068":"Bolivia","070":"Bosnia and Herzegovina","072":"Botswana",
            "076":"Brazil","084":"Belize","090":"Solomon Islands","096":"Brunei",
            "100":"Bulgaria","104":"Myanmar","108":"Burundi","112":"Belarus",
            "116":"Cambodia","120":"Cameroon","124":"Canada",
            "140":"Central African Republic","144":"Sri Lanka","148":"Chad",
            "152":"Chile","156":"China","158":"Taiwan","170":"Colombia",
            "174":"Comoros","178":"Congo","180":"Dem. Rep. Congo",
            "188":"Costa Rica","191":"Croatia","192":"Cuba","196":"Cyprus",
            "203":"Czechia","204":"Benin","208":"Denmark",
            "212":"Dominica","214":"Dominican Republic","218":"Ecuador",
            "222":"El Salvador","226":"Equatorial Guinea","231":"Ethiopia",
            "232":"Eritrea","233":"Estonia","238":"Falkland Islands","242":"Fiji",
            "246":"Finland","250":"France","258":"French Polynesia",
            "260":"Fr. S. Antarctic Lands","262":"Djibouti","266":"Gabon",
            "268":"Georgia","270":"Gambia","275":"Palestine","276":"Germany",
            "288":"Ghana","296":"Kiribati","300":"Greece","304":"Greenland",
            "308":"Grenada","320":"Guatemala","324":"Guinea","328":"Guyana",
            "332":"Haiti","336":"Vatican City","340":"Honduras","348":"Hungary",
            "352":"Iceland","356":"India","360":"Indonesia","364":"Iran",
            "368":"Iraq","372":"Ireland","376":"Israel","380":"Italy",
            "384":"Ivory Coast","388":"Jamaica","392":"Japan",
            "398":"Kazakhstan","400":"Jordan","404":"Kenya",
            "408":"North Korea","410":"South Korea","414":"Kuwait",
            "417":"Kyrgyzstan","418":"Laos","422":"Lebanon","426":"Lesotho",
            "428":"Latvia","430":"Liberia","434":"Libya","440":"Lithuania",
            "442":"Luxembourg","450":"Madagascar","454":"Malawi",
            "458":"Malaysia","462":"Maldives","466":"Mali","470":"Malta",
            "478":"Mauritania","480":"Mauritius","484":"Mexico","492":"Monaco",
            "496":"Mongolia","498":"Moldova","499":"Montenegro","504":"Morocco",
            "508":"Mozambique","512":"Oman","516":"Namibia","520":"Nauru",
            "524":"Nepal","528":"Netherlands","540":"New Caledonia",
            "548":"Vanuatu","554":"New Zealand","558":"Nicaragua","562":"Niger",
            "566":"Nigeria","578":"Norway","583":"Micronesia",
            "584":"Marshall Islands","585":"Palau","586":"Pakistan",
            "591":"Panama","598":"Papua New Guinea","600":"Paraguay",
            "604":"Peru","608":"Philippines","616":"Poland","620":"Portugal",
            "624":"Guinea-Bissau","626":"East Timor","630":"Puerto Rico",
            "634":"Qatar","642":"Romania","643":"Russia","646":"Rwanda",
            "659":"St. Kitts and Nevis","662":"Saint Lucia",
            "670":"St. Vincent and Grenadines","674":"San Marino",
            "678":"Sao Tome and Principe","682":"Saudi Arabia","686":"Senegal",
            "688":"Serbia","690":"Seychelles","694":"Sierra Leone",
            "702":"Singapore","703":"Slovakia","704":"Vietnam","705":"Slovenia",
            "706":"Somalia","710":"South Africa","716":"Zimbabwe","724":"Spain",
            "728":"South Sudan","729":"Sudan","732":"Western Sahara",
            "740":"Suriname","748":"Eswatini","752":"Sweden",
            "756":"Switzerland","760":"Syria","762":"Tajikistan",
            "764":"Thailand","768":"Togo","776":"Tonga",
            "780":"Trinidad and Tobago","784":"UAE","788":"Tunisia",
            "792":"Turkey","795":"Turkmenistan","798":"Tuvalu","800":"Uganda",
            "804":"Ukraine","807":"North Macedonia","818":"Egypt",
            "826":"United Kingdom","834":"Tanzania","840":"United States",
            "854":"Burkina Faso","858":"Uruguay","860":"Uzbekistan",
            "862":"Venezuela","882":"Samoa","887":"Yemen","894":"Zambia",
            "-99":"Northern Cyprus","900":"Kosovo"
        };

        // ── State ──
        var STORAGE_KEY = 'been-there-visited';
        var visited;
        try {
            visited = new Set(JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'));
        } catch (e) {
            visited = new Set();
        }
        var totalCountries = 0;
        var features = [];

        // ── DOM refs ──
        var loading = document.getElementById('loading');
        var countEl = document.getElementById('count');
        var totalEl = document.getElementById('total');
        var tooltipEl = document.getElementById('tooltip');
        var tooltipName = document.getElementById('tooltip-name');
        var tooltipCheck = document.getElementById('tooltip-check');

        // ── SVG setup ──
        var W = 960, H = 500;
        var svg = d3.select('#map')
            .attr('viewBox', '0 0 ' + W + ' ' + H)
            .attr('preserveAspectRatio', 'xMidYMid meet');

        var projection = d3.geoNaturalEarth1()
            .fitSize([W, H], { type: 'Sphere' });
        var pathGen = d3.geoPath(projection);

        var g = svg.append('g');

        // Pixel art ocean stipple pattern
        var defs = svg.append('defs');
        var stipple = defs.append('pattern')
            .attr('id', 'ocean-stipple')
            .attr('width', 5)
            .attr('height', 5)
            .attr('patternUnits', 'userSpaceOnUse');
        stipple.append('circle')
            .attr('cx', 2.5).attr('cy', 2.5).attr('r', 0.4)
            .attr('fill', '#d4cfc5').attr('opacity', 0.15);

        // Zoom
        var mapEl = document.getElementById('map');
        var zoomBehavior = d3.zoom()
            .scaleExtent([1, 8])
            .on('start', function (event) {
                if (event.sourceEvent && event.sourceEvent.type !== 'wheel') {
                    mapEl.classList.add('panning');
                }
            })
            .on('zoom', function (event) {
                g.attr('transform', event.transform);
            })
            .on('end', function () {
                mapEl.classList.remove('panning');
            });
        svg.call(zoomBehavior);

        // Ocean
        g.append('path')
            .datum({ type: 'Sphere' })
            .attr('class', 'sphere')
            .attr('d', pathGen);

        // Ocean stipple texture
        g.append('path')
            .datum({ type: 'Sphere' })
            .attr('d', pathGen)
            .attr('fill', 'url(#ocean-stipple)')
            .attr('pointer-events', 'none');

        // Graticule (major)
        g.append('path')
            .datum(d3.geoGraticule().step([30, 30])())
            .attr('class', 'graticule')
            .attr('d', pathGen);

        // Graticule (fine — topo survey feel)
        g.append('path')
            .datum(d3.geoGraticule().step([10, 10])())
            .attr('class', 'graticule-fine')
            .attr('d', pathGen);

        // ── Load & render ──
        try {
            var res = await fetch('https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json');
            if (!res.ok) throw new Error(res.statusText);
            var world = await res.json();

            var countries = topojson.feature(world, world.objects.countries);
            var borders = topojson.mesh(world, world.objects.countries, function (a, b) { return a !== b; });

            var antarcticaFeature = countries.features.find(function (f) { return f.id === '010'; });
            features = countries.features.filter(function (f) { return f.id !== '010'; });
            totalCountries = features.length;
            totalEl.textContent = totalCountries;

            g.selectAll('.country')
                .data(features)
                .join('path')
                .attr('class', function (d) {
                    var cls = 'country revealing';
                    if (visited.has(String(d.id))) cls += ' visited';
                    return cls;
                })
                .attr('d', pathGen)
                .attr('data-id', function (d) { return d.id; })
                .style('animation-delay', function (d) {
                    var c = pathGen.centroid(d);
                    if (isNaN(c[0])) return '0s';
                    return ((c[0] / W) * 1.0).toFixed(2) + 's';
                })
                .on('click', handleClick)
                .on('mouseenter', handleEnter)
                .on('mouseleave', handleLeave);

            g.append('path')
                .datum(borders)
                .attr('class', 'boundary')
                .attr('d', pathGen);

            // Antarctica (non-clickable)
            if (antarcticaFeature) {
                g.append('path')
                    .datum(antarcticaFeature)
                    .attr('class', 'antarctica')
                    .attr('d', pathGen);
            }

            // Real world rivers (Natural Earth 110m)
            try {
                var riverRes = await fetch('https://raw.githubusercontent.com/nvkelso/natural-earth-vector/master/geojson/ne_110m_rivers_lake_centerlines.geojson');
                if (riverRes.ok) {
                    var riverData = await riverRes.json();
                    var riverGroup = g.append('g').attr('class', 'rivers');
                    riverGroup.selectAll('.river')
                        .data(riverData.features)
                        .join('path')
                        .attr('class', 'river')
                        .attr('d', pathGen);
                }
            } catch (e) {
                console.warn('Rivers data unavailable:', e);
            }

            // Pixel water waves (cute ocean animations)
            var waveGroup = g.append('g').attr('class', 'ocean-waves');
            var wavePositions = [
                [65, 160], [110, 290], [45, 360], [85, 420],
                [385, 130], [405, 260], [375, 360], [425, 190],
                [645, 310], [675, 360], [615, 290],
                [885, 210], [915, 310], [855, 160], [925, 410],
                [305, 475], [505, 468], [705, 475],
                [505, 28], [355, 35]
            ];
            wavePositions.forEach(function (pos, i) {
                waveGroup.append('path')
                    .attr('class', 'wave-pixel')
                    .attr('d', 'M' + pos[0] + ',' + pos[1] +
                        ' l2,-1.5 l2,1.5 l2,-1.5 l2,1.5 l2,-1.5 l2,1.5')
                    .style('animation-delay', (i * 0.4 % 3).toFixed(1) + 's');
            });

            // Pixel wind dashes (cute breeze animations)
            var windGroup = g.append('g').attr('class', 'ocean-wind');
            var windPositions = [
                [155, 210, -5], [505, 160, -3], [755, 260, -8],
                [305, 310, 5], [825, 360, -4], [205, 430, 3],
                [605, 110, -6], [455, 390, 4], [75, 250, -2],
                [560, 320, 6], [780, 180, -5], [340, 140, 3]
            ];
            windPositions.forEach(function (pos, i) {
                windGroup.append('path')
                    .attr('class', 'wind-pixel')
                    .attr('d', 'M' + pos[0] + ',' + pos[1] +
                        ' h8 M' + (pos[0] + 1.5) + ',' + (pos[1] + 2) + ' h5.5')
                    .attr('transform', 'rotate(' + pos[2] + ' ' + pos[0] + ' ' + pos[1] + ')')
                    .style('animation-delay', (i * 0.6 % 4).toFixed(1) + 's');
            });

            // Ocean name labels (vintage atlas feel)
            var oceanLabels = [
                [100, 310, 'PACIFIC'], [400, 290, 'ATLANTIC'],
                [650, 345, 'INDIAN'], [880, 280, 'PACIFIC']
            ];
            var oceanLabelGroup = g.append('g').attr('class', 'ocean-labels');
            oceanLabels.forEach(function (ol) {
                oceanLabelGroup.append('text')
                    .attr('x', ol[0]).attr('y', ol[1])
                    .attr('class', 'ocean-label')
                    .text(ol[2]);
            });

            // Pixel compass rose
            var compass = g.append('g')
                .attr('class', 'compass-rose')
                .attr('transform', 'translate(900, 65)');
            compass.append('path')
                .attr('d', 'M0,-10 v20 M-10,0 h20');
            compass.append('path')
                .attr('d', 'M0,-3 L2,0 L0,3 L-2,0 Z')
                .attr('fill', 'var(--text-tertiary)')
                .attr('stroke', 'none')
                .attr('opacity', 0.4);
            compass.append('text')
                .attr('y', -13).text('N');
            compass.append('text')
                .attr('y', 16).attr('dominant-baseline', 'hanging').text('S');
            compass.append('text')
                .attr('x', 14).attr('dominant-baseline', 'central').text('E');
            compass.append('text')
                .attr('x', -14).attr('dominant-baseline', 'central')
                .attr('text-anchor', 'end').text('W');

            setTimeout(function () {
                d3.selectAll('.country').classed('revealing', false);
            }, 1800);

            updateCounter();
            renderInitialLabels();
            loading.classList.add('hidden');

        } catch (err) {
            console.error('Failed to load map:', err);
            loading.querySelector('p').textContent = 'Failed to load map data';
            loading.querySelector('.loader').style.display = 'none';
        }

        // ── Country Labels ──
        var labelGroup = g.append('g').attr('class', 'labels');

        function addLabel(feature) {
            var id = String(feature.id);
            var name = NAMES[id];
            if (!name) return;

            var centroid = pathGen.centroid(feature);
            if (isNaN(centroid[0])) return;

            var label = labelGroup.append('g')
                .attr('class', 'country-label')
                .attr('data-label-id', id)
                .attr('transform', 'translate(' + centroid[0] + ',' + centroid[1] + ')');

            var textNode = label.append('text').text('✓ ' + name);
            var bbox = textNode.node().getBBox();
            var px = 4, py = 2;

            label.insert('rect', 'text')
                .attr('x', bbox.x - px)
                .attr('y', bbox.y - py)
                .attr('width', bbox.width + px * 2)
                .attr('height', bbox.height + py * 2);

            requestAnimationFrame(function () {
                label.classed('visible', true);
            });
        }

        function removeLabel(id) {
            labelGroup.select('[data-label-id="' + id + '"]')
                .classed('visible', false)
                .transition().duration(300).remove();
        }

        // Render labels for already-visited countries
        function renderInitialLabels() {
            features.forEach(function (f) {
                if (visited.has(String(f.id))) addLabel(f);
            });
        }

        // ── Handlers ──
        function handleClick(event, d) {
            event.stopPropagation();
            var id = String(d.id);
            var el = d3.select(this);

            if (visited.has(id)) {
                visited.delete(id);
                el.classed('visited', false);
                removeLabel(id);
            } else {
                visited.add(id);
                el.classed('visited', true);
                addLabel(d);
            }

            el.classed('pulse', false);
            void this.offsetWidth;
            el.classed('pulse', true);

            save();
            updateCounter();
            showTooltip(id);
        }

        function handleEnter(event, d) {
            showTooltip(String(d.id));
        }

        function handleLeave() {
            tooltipEl.classList.remove('visible');
        }

        function showTooltip(id) {
            var name = NAMES[id] || ('Unknown (' + id + ')');
            tooltipName.textContent = name;
            if (visited.has(id)) {
                tooltipCheck.classList.add('show');
            } else {
                tooltipCheck.classList.remove('show');
            }
            tooltipEl.classList.add('visible');
        }

        function updateCounter() {
            countEl.textContent = visited.size;
        }

        function save() {
            try {
                localStorage.setItem(STORAGE_KEY, JSON.stringify(Array.from(visited)));
            } catch (e) {
                console.warn('localStorage save failed:', e);
            }
        }

        // ── Zoom controls ──
        document.getElementById('zoom-in-btn').addEventListener('click', function () {
            svg.transition().duration(300).call(zoomBehavior.scaleBy, 1.5);
        });

        document.getElementById('zoom-out-btn').addEventListener('click', function () {
            svg.transition().duration(300).call(zoomBehavior.scaleBy, 1 / 1.5);
        });

        document.getElementById('zoom-reset-btn').addEventListener('click', function () {
            svg.transition().duration(500).call(zoomBehavior.transform, d3.zoomIdentity);
        });

        // ── Export PNG (light mode) ──
        document.getElementById('export-btn').addEventListener('click', async function () {
            var btn = this;
            btn.textContent = 'Exporting\u2026';
            btn.disabled = true;

            try {
                var svgEl = document.getElementById('map');
                var clone = svgEl.cloneNode(true);

                var gEl = clone.querySelector('g');
                if (gEl) gEl.removeAttribute('transform');

                var styleEl = document.createElementNS('http://www.w3.org/2000/svg', 'style');
                styleEl.textContent = [
                    '.sphere { fill: #f3f0ea; }',
                    '.graticule { fill: none; stroke: #ece8e0; stroke-width: 0.5; }',
                    '.boundary { fill: none; stroke: rgba(55,53,47,0.08); stroke-width: 0.5; }',
                    '.country { fill: #e0dbd2; stroke: #d4cfc5; stroke-width: 0.5; }',
                    '.country.visited { fill: #7d8c6e; stroke: #6d7b5f; }',
                    '.graticule-fine { fill: none; stroke: #ece8e0; stroke-width: 0.3; opacity: 0.4; }',
                    '.river { fill: none; stroke: #d4cfc5; stroke-width: 0.5; opacity: 0.55; }',
                    '.antarctica { fill: #e0dbd2; stroke: #d4cfc5; stroke-width: 0.3; }',
                    '.wave-pixel, .wind-pixel { display: none; }',
                    '.country-label rect { fill: #7d8c6e; rx: 2; }',
                    '.country-label text { fill: #fff; font-family: "Silkscreen", cursive; font-size: 3.5px; font-weight: 500; letter-spacing: 0.04em; text-anchor: middle; dominant-baseline: central; text-transform: uppercase; }',
                    '.ocean-label { fill: #a3a09a; font-family: "Silkscreen", cursive; font-size: 3px; text-anchor: middle; letter-spacing: 0.3em; opacity: 0.25; }',
                    '.compass-rose line, .compass-rose path { stroke: #a3a09a; stroke-width: 0.4; fill: none; }',
                    '.compass-rose text { fill: #a3a09a; font-family: "Silkscreen", cursive; font-size: 3px; text-anchor: middle; }',
                    '.country-label { opacity: 1; }'
                ].join('\n');
                clone.prepend(styleEl);

                clone.querySelectorAll('.revealing, .pulse').forEach(function (el) {
                    el.classList.remove('revealing', 'pulse');
                });

                var svgData = new XMLSerializer().serializeToString(clone);
                var blob = new Blob([svgData], { type: 'image/svg+xml;charset=utf-8' });
                var url = URL.createObjectURL(blob);

                var img = new Image();
                img.onload = function () {
                    var canvas = document.createElement('canvas');
                    var scale = 2;
                    canvas.width = W * scale;
                    canvas.height = H * scale;
                    var ctx = canvas.getContext('2d');

                    ctx.fillStyle = '#faf8f5';
                    ctx.fillRect(0, 0, canvas.width, canvas.height);

                    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);

                    // Watermark
                    ctx.fillStyle = 'rgba(55, 53, 47, 0.15)';
                    ctx.font = '500 16px "Silkscreen", cursive';
                    ctx.textAlign = 'right';
                    ctx.fillText('been there', canvas.width - 48, canvas.height - 32);

                    ctx.font = '14px "Silkscreen", cursive';
                    ctx.textAlign = 'left';
                    ctx.fillText(visited.size + ' / ' + totalCountries, 48, canvas.height - 34);

                    var a = document.createElement('a');
                    a.download = 'been-there-map.png';
                    a.href = canvas.toDataURL('image/png');
                    a.click();

                    URL.revokeObjectURL(url);

                    btn.textContent = 'Done!';
                    btn.classList.add('success');
                    setTimeout(function () {
                        btn.textContent = 'Export';
                        btn.disabled = false;
                        btn.classList.remove('success');
                    }, 1500);
                };

                img.onerror = function () {
                    URL.revokeObjectURL(url);
                    throw new Error('Image render failed');
                };

                img.src = url;

            } catch (err) {
                console.error('Export failed:', err);
                btn.textContent = 'Error';
                setTimeout(function () {
                    btn.textContent = 'Export';
                    btn.disabled = false;
                }, 1500);
            }
        });

        // ── Reset ──
        var resetBtn = document.getElementById('reset-btn');
        var resetTimer = null;

        resetBtn.addEventListener('click', function () {
            if (this.classList.contains('confirm')) {
                visited.clear();
                save();
                d3.selectAll('.country').classed('visited', false);
                labelGroup.selectAll('.country-label').remove();
                updateCounter();
                this.classList.remove('confirm');
                this.textContent = 'Reset';
                clearTimeout(resetTimer);
            } else {
                this.classList.add('confirm');
                this.textContent = 'Sure?';
                var self = this;
                resetTimer = setTimeout(function () {
                    self.classList.remove('confirm');
                    self.textContent = 'Reset';
                }, 3000);
            }
        });

    })();
    </script>
</body>
</html>
